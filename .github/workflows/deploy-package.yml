name: Deploy Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-deploy-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deploy image
        run: docker build -t sub2api-gha:docker-deploy .

      - name: Resolve package metadata
        id: meta
        shell: bash
        run: |
          FIXED_ASSET="sub2api-docker-image.tar"
          echo "fixed_asset=${FIXED_ASSET}" >> "${GITHUB_OUTPUT}"
          echo "fixed_sha=${FIXED_ASSET}.sha256" >> "${GITHUB_OUTPUT}"

      - name: Export fixed deploy image tar
        run: docker save -o "${{ steps.meta.outputs.fixed_asset }}" sub2api-gha:docker-deploy

      - name: Generate fixed checksum
        shell: bash
        run: sha256sum "${{ steps.meta.outputs.fixed_asset }}" > "${{ steps.meta.outputs.fixed_sha }}"

      - name: Publish fixed deploy release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: docker-deploy
          name: Docker Deploy Package
          body: |
            Fixed release asset used by the admin-panel deployment flow.

            Asset URL:
            https://github.com/${{ github.repository }}/releases/download/docker-deploy/sub2api-docker-image.tar
          files: |
            ${{ steps.meta.outputs.fixed_asset }}
            ${{ steps.meta.outputs.fixed_sha }}
          make_latest: false
          prerelease: true
          append_body: false
          generate_release_notes: false
          fail_on_unmatched_files: true
          preserve_order: true
          draft: false
          target_commitish: ${{ github.sha }}
          overwrite_files: true
